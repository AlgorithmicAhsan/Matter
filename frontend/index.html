<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PosiSim – VTuber Motion Capture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:     #07070f;
            --panel:  #0d0d1a;
            --border: #1a1a30;
            --cyan:   #00d4ff;
            --green:  #00ff88;
            --orange: #ff7043;
            --red:    #ff3232;
            --text:   #c8d0e0;
            --muted:  #4a5068;
            --font:   'Inter', sans-serif;
            --mono:   'JetBrains Mono', monospace;
        }

        body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* ── Layout ── */
        #container { display: flex; flex-direction: column; height: 100vh; }

        #mainContent {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 8px;
            padding: 8px;
        }

        #canvasPanel {
            flex: 1;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            min-width: 0;
        }

        #canvasPanel canvas { display: block; width: 100%; height: 100%; }

        /* ── Camera preview overlay — top left ── */
        #camPreview {
            position: absolute;
            top: 12px;
            left: 12px;
            width: 220px;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(0,212,255,.25);
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0,0,0,.6);
        }

        #camPreview video {
            width: 100%;
            display: block;
            transform: scaleX(-1);
            opacity: 0;
            position: absolute;
            top: 0; left: 0;
        }

        #camPreview canvas {
            width: 100%;
            display: block;
            transform: scaleX(-1);
        }

        #camLabel {
            position: absolute;
            top: 5px;
            left: 8px;
            font-size: 9px;
            font-family: var(--mono);
            color: var(--cyan);
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 2;
            text-shadow: 0 0 8px rgba(0,212,255,.8);
        }

        #camMode {
            position: absolute;
            bottom: 5px;
            right: 8px;
            font-size: 9px;
            font-family: var(--mono);
            color: var(--green);
            z-index: 2;
        }

        /* ── Dashboard ── */
        #dashboardPanel {
            width: 300px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 18px;
            overflow-y: auto;
        }

        .sectionTitle {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--cyan);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sectionTitle::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .statRow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-bottom: 6px;
        }
        .statLabel { color: var(--muted); }
        .statValue { color: var(--cyan); font-family: var(--mono); font-weight: 600; }

        /* Detection status grid */
        #detectionGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .detBadge {
            padding: 6px 8px;
            border-radius: 5px;
            font-size: 10px;
            font-family: var(--mono);
            font-weight: 600;
            text-align: center;
            letter-spacing: .5px;
            border: 1px solid var(--border);
            color: var(--muted);
            background: rgba(255,255,255,.02);
            transition: all .2s;
        }
        .detBadge.active {
            color: var(--green);
            background: rgba(0,255,136,.08);
            border-color: rgba(0,255,136,.3);
        }

        /* Uncertainty bars */
        .barWrap { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
        .barLabel { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; }
        .barTrack { height: 6px; background: rgba(255,255,255,.05); border-radius: 3px; overflow: hidden; }
        .barFill  { height: 100%; border-radius: 3px; transition: width .3s, background .3s; }

        #trustBadge {
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-weight: 700;
            font-size: 12px;
            animation: pulse 2s ease-in-out infinite;
        }
        #trustBadge.trusted   { background: rgba(0,255,136,.1); color: var(--green); border: 1px solid var(--green); }
        #trustBadge.untrusted { background: rgba(255,50,50,.1);  color: var(--red);   border: 1px solid var(--red); }

        @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:.65 } }

        #uncertaintyGraph {
            width: 100%; height: 100px;
            background: rgba(0,212,255,.03);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        /* ── Loading overlay ── */
        #loadingOverlay {
            position: absolute;
            inset: 0;
            background: rgba(7,7,15,.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            gap: 14px;
        }
        #loadingOverlay .spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loadingPct { font-family: var(--mono); color: var(--cyan); font-size: 14px; }

        /* ── Control bar ── */
        #controlBar {
            background: var(--panel);
            border-top: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .btnGroup { display: flex; gap: 8px; }

        button {
            padding: 8px 18px;
            border: none;
            border-radius: 6px;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: .5px;
            text-transform: uppercase;
            transition: all .2s;
        }
        #startBtn { background: var(--green); color: #000; }
        #startBtn:hover:not(:disabled) { filter: brightness(1.1); box-shadow: 0 0 14px rgba(0,255,136,.5); }
        #stopBtn  { background: var(--red);   color: #fff; }
        #stopBtn:hover:not(:disabled)  { filter: brightness(1.1); box-shadow: 0 0 14px rgba(255,50,50,.5); }
        #saveBtn  { background: var(--cyan);  color: #000; }
        #saveBtn:hover:not(:disabled)  { filter: brightness(1.1); box-shadow: 0 0 14px rgba(0,212,255,.5); }
        button:disabled { opacity: .4; cursor: not-allowed; }

        .statusInfo { display: flex; gap: 16px; font-size: 11px; align-items: center; }
        .statusItem { display: flex; align-items: center; gap: 6px; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); }
        .dot.on { background: var(--green); box-shadow: 0 0 6px rgba(0,255,136,.8); }
        .statusText  { color: var(--muted); }
        .statusValue { color: var(--cyan); font-weight: 600; font-family: var(--mono); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>
<div id="container">
    <div id="mainContent">

        <!-- ── 3D Canvas ── -->
        <div id="canvasPanel">
            <div id="3d-canvas" style="width:100%;height:100%;"></div>

            <!-- Camera preview + landmark overlay — top left -->
            <div id="camPreview">
                <div id="camLabel">● LIVE</div>
                <video id="inputVideo" autoplay muted playsinline></video>
                <canvas id="guideCanvas"></canvas>
                <div id="camMode">BODY</div>
            </div>

            <!-- Loading overlay -->
            <div id="loadingOverlay">
                <div class="spinner"></div>
                <div id="loadingPct">0%</div>
                <div style="color:var(--muted);font-size:12px;">Loading avatar…</div>
            </div>
        </div>

        <!-- ── Dashboard ── -->
        <div id="dashboardPanel">

            <div>
                <div class="sectionTitle">Detection</div>
                <div id="detectionGrid">
                    <div class="detBadge" id="detFace">FACE</div>
                    <div class="detBadge" id="detPose">POSE</div>
                    <div class="detBadge" id="detLeftHand">L HAND</div>
                    <div class="detBadge" id="detRightHand">R HAND</div>
                </div>
            </div>

            <div>
                <div class="sectionTitle">Frame Data</div>
                <div class="statRow"><span class="statLabel">Frame</span><span class="statValue" id="frameCount">0</span></div>
                <div class="statRow"><span class="statLabel">BVH Frames</span><span class="statValue" id="bvhFrames">0</span></div>
                <div class="statRow"><span class="statLabel">Skipped</span><span class="statValue" id="skippedFrames">0</span></div>
                <div class="statRow"><span class="statLabel">Coverage</span><span class="statValue" id="coveragePct">0%</span></div>
            </div>

            <div>
                <div class="sectionTitle">Uncertainty</div>
                <div class="barWrap">
                    <div class="barLabel"><span>Aleatoric</span><span id="aleatoricVal">0.000</span></div>
                    <div class="barTrack"><div class="barFill" id="aleatoricBar" style="width:0%"></div></div>
                </div>
                <div class="barWrap">
                    <div class="barLabel"><span>Epistemic</span><span id="epistemicVal">0.000</span></div>
                    <div class="barTrack"><div class="barFill" id="epistemicBar" style="width:0%"></div></div>
                </div>
                <div class="barWrap">
                    <div class="barLabel"><span>Total</span><span id="totalVal">0.000</span></div>
                    <div class="barTrack"><div class="barFill" id="totalBar" style="width:0%"></div></div>
                </div>
                <div id="trustBadge" class="trusted">✓ TRUSTED</div>
            </div>

            <div>
                <div class="sectionTitle">History</div>
                <canvas id="uncertaintyGraph"></canvas>
            </div>

        </div>
    </div>

    <!-- ── Control Bar ── -->
    <div id="controlBar">
        <div class="btnGroup">
            <button id="startBtn">▶ Start Rec</button>
            <button id="stopBtn" disabled>⏹ Stop</button>
            <button id="saveBtn" disabled>💾 Save BVH</button>
        </div>
        <div class="statusInfo">
            <div class="statusItem">
                <div class="dot" id="wsDot"></div>
                <span class="statusText">WS: <span class="statusValue" id="wsStatus">…</span></span>
            </div>
            <div class="statusItem">
                <span class="statusText">FPS: <span class="statusValue" id="fpsCounter">0</span></span>
            </div>
            <div class="statusItem">
                <span class="statusText">Holistic: <span class="statusValue" id="holisticStatus">Loading…</span></span>
            </div>
        </div>
    </div>
</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<!-- MediaPipe Holistic -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5.1635989137/holistic.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<!-- Kalidokit -->
<script src="https://cdn.jsdelivr.net/npm/kalidokit@1.1/dist/kalidokit.umd.js"></script>

<!-- App scripts -->
<script src="/frontend/avatar.js"></script>
<script src="/frontend/uncertainty_ui.js"></script>

<script>
// ── PosiSim VTuber App ────────────────────────────────────────────────────────
class PosiSimApp {
    constructor() {
        this.ws          = null;
        this.avatar      = null;
        this.ui          = null;
        this.recording   = false;
        this._frameCount = 0;
        this._lastFpsTime = Date.now();

        // Kalidokit helpers
        this._remap = Kalidokit.Utils.remap;
        this._clamp = Kalidokit.Utils.clamp;
        this._lerp  = Kalidokit.Vector.lerp;

        // Holistic
        this._holistic     = null;
        this._holisticReady = false;
        this._lastResults  = null;

        // UI elements
        this._videoEl  = document.getElementById('inputVideo');
        this._guideCanvas = document.getElementById('guideCanvas');
        this._guideCtx    = this._guideCanvas.getContext('2d');

        this._setupButtons();
        this._connectWebSocket();
        this._startFPSCounter();
        this._initHolistic();
    }

    // ── Holistic ──────────────────────────────────────────────────────────────
    _initHolistic() {
        document.getElementById('holisticStatus').textContent = 'Init…';

        this._holistic = new Holistic({
            locateFile: file =>
                `https://cdn.jsdelivr.net/npm/@mediapipe/holistic@0.5.1635989137/${file}`
        });

        this._holistic.setOptions({
            modelComplexity:       1,
            smoothLandmarks:       true,
            enableSegmentation:    false,
            refineFaceLandmarks:   true,
            minDetectionConfidence: 0.6,
            minTrackingConfidence:  0.6,
        });

        this._holistic.onResults(results => this._onHolisticResults(results));

        // Start camera feed once holistic is ready
        const cam = new Camera(this._videoEl, {
            onFrame: async () => {
                await this._holistic.send({ image: this._videoEl });
            },
            width:  640,
            height: 480,
        });
        cam.start().then(() => {
            this._holisticReady = true;
            document.getElementById('holisticStatus').textContent = 'Active';
        }).catch(err => {
            console.error('Camera start failed:', err);
            document.getElementById('holisticStatus').textContent = 'Cam Error';
        });
    }

    _onHolisticResults(results) {
        this._lastResults = results;
        this._drawGuideCanvas(results);

        if (!this.avatar) return;

        const faceLm  = results.faceLandmarks;
        const pose2d  = results.poseLandmarks;
        const pose3d  = results.ea;               // world landmarks
        const leftHand  = results.rightHandLandmarks;  // mediapipe flips hands
        const rightHand = results.leftHandLandmarks;

        // Detection badges
        this._setBadge('detFace',      !!faceLm);
        this._setBadge('detPose',      !!pose2d);
        this._setBadge('detLeftHand',  !!leftHand);
        this._setBadge('detRightHand', !!rightHand);

        // Camera mode — face-only when pose not detected
        const faceOnly = !!faceLm && !pose2d;
        this.avatar.updateCameraMode(faceOnly);
        document.getElementById('camMode').textContent = faceOnly ? 'FACE' : 'BODY';

        // Solve with Kalidokit
        let riggedPose = null, riggedFace = null, riggedLeftHand = null, riggedRightHand = null;

        if (faceLm) {
            riggedFace = Kalidokit.Face.solve(faceLm, {
                runtime: 'mediapipe',
                video:   this._videoEl,
            });
        }

        if (pose2d && pose3d) {
            riggedPose = Kalidokit.Pose.solve(pose3d, pose2d, {
                runtime: 'mediapipe',
                video:   this._videoEl,
            });
        }

        if (leftHand) {
            riggedLeftHand = Kalidokit.Hand.solve(leftHand, 'Left');
        }

        if (rightHand) {
            riggedRightHand = Kalidokit.Hand.solve(rightHand, 'Right');
        }

        this.avatar.applyHolisticResults(riggedPose, riggedFace, riggedLeftHand, riggedRightHand);
    }

    // ── Draw landmark overlay on guide canvas ─────────────────────────────────
    _drawGuideCanvas(results) {
        const vidW = this._videoEl.videoWidth  || 640;
        const vidH = this._videoEl.videoHeight || 480;

        this._guideCanvas.width  = vidW;
        this._guideCanvas.height = vidH;

        const ctx = this._guideCtx;
        ctx.save();
        ctx.clearRect(0, 0, vidW, vidH);

        // Draw camera image mirrored (video CSS already mirrors it, canvas draws raw)
        ctx.drawImage(this._videoEl, 0, 0, vidW, vidH);

        drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {
            color: '#00cff7', lineWidth: 2
        });
        drawLandmarks(ctx, results.poseLandmarks, {
            color: '#ff0364', lineWidth: 1, radius: 2
        });
        drawConnectors(ctx, results.faceLandmarks, FACEMESH_TESSELATION, {
            color: '#C0C0C050', lineWidth: 0.5
        });
        if (results.faceLandmarks && results.faceLandmarks.length === 478) {
            drawLandmarks(ctx, [results.faceLandmarks[468], results.faceLandmarks[473]], {
                color: '#ffe603', lineWidth: 1, radius: 2
            });
        }
        drawConnectors(ctx, results.leftHandLandmarks, HAND_CONNECTIONS, {
            color: '#eb1064', lineWidth: 2
        });
        drawLandmarks(ctx, results.leftHandLandmarks, {
            color: '#00cff7', lineWidth: 1, radius: 2
        });
        drawConnectors(ctx, results.rightHandLandmarks, HAND_CONNECTIONS, {
            color: '#22c3e3', lineWidth: 2
        });
        drawLandmarks(ctx, results.rightHandLandmarks, {
            color: '#ff0364', lineWidth: 1, radius: 2
        });

        ctx.restore();
    }

    _setBadge(id, active) {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('active', active);
    }

    // ── WebSocket (for BVH recording + uncertainty) ───────────────────────────
    _connectWebSocket() {
        this.ws = new WebSocket('ws://localhost:8000/ws');

        this.ws.onopen = () => {
            this._setWSStatus('Connected', true);

            if (!this.avatar) {
                this.avatar = new AvatarRenderer('3d-canvas');
                document.getElementById('loadingOverlay').style.display = 'flex';
            }
            this.ui = new UncertaintyUI();
        };

        this.ws.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                if (data.event)         this._handleEvent(data);
                else if (data.frame != null) this._handleFrame(data);
            } catch (err) { console.error('WS parse error:', err); }
        };

        this.ws.onerror  = () => this._setWSStatus('Error', false);
        this.ws.onclose  = () => {
            this._setWSStatus('Disconnected', false);
            setTimeout(() => this._connectWebSocket(), 3000);
        };
    }

    _handleFrame(data) {
        this._frameCount++;

        document.getElementById('frameCount').textContent   = data.frame;
        document.getElementById('bvhFrames').textContent    = data.bvhFrames;
        document.getElementById('skippedFrames').textContent = data.bvhSkipped;

        if (data.frame > 0) {
            const cov = ((data.bvhFrames / (data.frame + 1)) * 100).toFixed(1);
            document.getElementById('coveragePct').textContent = cov + '%';
        }

        if (this.ui && data.uncertainty) this.ui.update(data.uncertainty);

        // Hide loading overlay on first frame
        const overlay = document.getElementById('loadingOverlay');
        if (overlay && overlay.style.display !== 'none') overlay.style.display = 'none';
    }

    _handleEvent(data) {
        switch (data.event) {
            case 'recording_started':
                this.recording = true;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled  = false;
                break;
            case 'recording_stopped':
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled  = true;
                document.getElementById('saveBtn').disabled  = false;
                break;
            case 'bvh_saved':
                document.getElementById('saveBtn').disabled = true;
                alert(`BVH saved: ${data.filename}\nFrames: ${data.frames}, Skipped: ${data.skipped}, Coverage: ${data.coveragePct}%`);
                break;
        }
    }

    // ── Buttons ───────────────────────────────────────────────────────────────
    _setupButtons() {
        document.getElementById('startBtn').onclick = () => {
            this.ws.send(JSON.stringify({ action: 'start_recording' }));
        };
        document.getElementById('stopBtn').onclick = () => {
            this.ws.send(JSON.stringify({ action: 'stop_recording' }));
            this.recording = false;
        };
        document.getElementById('saveBtn').onclick = () => {
            this.ws.send(JSON.stringify({ action: 'save_bvh' }));
        };
    }

    _setWSStatus(label, ok) {
        document.getElementById('wsStatus').textContent = label;
        document.getElementById('wsDot').classList.toggle('on', ok);
    }

    _startFPSCounter() {
        setInterval(() => {
            const now   = Date.now();
            const delta = (now - this._lastFpsTime) / 1000;
            document.getElementById('fpsCounter').textContent = (this._frameCount / delta).toFixed(0);
            this._frameCount  = 0;
            this._lastFpsTime = now;
        }, 1000);
    }
}

window.addEventListener('load', () => {
    window.posiSimApp = new PosiSimApp();
});
</script>
</body>
</html>
